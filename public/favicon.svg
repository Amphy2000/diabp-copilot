<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1329" />
      <stop offset="100%" stop-color="#080c14" />
    </linearGradient>
    
    <!-- Heartbeat Line Gradient -->
    <linearGradient id="pulse-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" />
      <stop offset="50%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#14b8a6" />
    </linearGradient>
    
    <!-- Drop Shadow / Glow for the Pulse Line -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Background Card / Circle -->
  <rect width="512" height="512" rx="128" fill="url(#bg-grad)" />

  <!-- Outer Ring -->
  <rect x="16" y="16" width="480" height="480" rx="112" fill="none" stroke="#1e293b" stroke-width="8" opacity="0.3" />

  <!-- Pulse Path Group -->
  <g filter="url(#glow)">
    <!-- Heart shape outline (subtle background element) -->
    <path d="M256,384 C256,384 136,304 136,208 C136,152.8 179.8,112 232,112 C248,112 256,120 256,120 C256,120 264,112 280,112 C332.2,112 376,152.8 376,208 C376,304 256,384 256,384 Z" fill="none" stroke="#1e293b" stroke-width="4" stroke-dasharray="8 8" opacity="0.4" />
    
    <!-- Heartbeat/Activity Pulse Line -->
    <path d="M64,256 L160,256 L192,160 L224,352 L256,96 L288,416 L320,224 L352,288 L384,256 L448,256" 
          fill="none" 
          stroke="url(#pulse-grad)" 
          stroke-width="28" 
          stroke-linecap="round" 
          stroke-linejoin="round" />
  </g>

  <!-- Small Glowing Dot at the end of the pulse -->
  <circle cx="448" cy="256" r="16" fill="#14b8a6" filter="url(#glow)" />
</svg>