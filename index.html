<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DiaBP-Copilot | AI Diabetes & Hypertension Care Hub</title>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <!-- Flutterwave Standard Inline Checkout -->
    <script src="https://checkout.flutterwave.com/v3.js"></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // 1. Unhandled exception / chunk loading error observer
      window.addEventListener('error', (e) => {
        const msg = e.message || '';
        if (msg.includes('Loading chunk') || msg.includes('Script error') || msg.includes('Unexpected token') || msg.includes('TypeError')) {
          console.warn('Critical bundle loading error caught. Purging Service Worker and hard reloading...', e);
          if ('serviceWorker' in navigator) {
            navigator.serviceWorker.getRegistrations().then(regs => {
              for (const reg of regs) reg.unregister();
              window.location.reload();
            });
          }
        }
      }, true);

      // 2. Blank screen observer & self-healing trigger
      window.addEventListener('load', () => {
        setTimeout(() => {
          const rootEl = document.getElementById('root');
          if (rootEl && !rootEl.hasChildNodes()) {
            console.warn('Blank screen detected. Executing emergency workspace reset...');
            if ('serviceWorker' in navigator) {
              navigator.serviceWorker.getRegistrations().then(regs => {
                for (const reg of regs) reg.unregister();
                window.location.reload();
              });
            } else {
              window.location.reload();
            }
          }
        }, 3000); // Check 3 seconds after complete window load
      });

      // 3. Regular Service Worker registration
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js').then((reg) => {
            console.log('ServiceWorker registration successful with scope: ', reg.scope);
          }).catch((err) => {
            console.error('ServiceWorker registration failed: ', err);
          });
        });
      }
    </script>
  </body>
</html>
